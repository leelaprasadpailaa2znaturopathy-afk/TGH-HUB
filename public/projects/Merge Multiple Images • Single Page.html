<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro Image to PDF | TGH Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --primary-glow: rgba(99, 102, 241, 0.4);
      --accent: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --bg-dark: #0f172a;
      --bg-gradient: radial-gradient(circle at top right, #1e1b4b, #0f172a 60%);
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-dim: #94a3b8;
      --card-gradient: linear-gradient(145deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 100%);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: var(--bg-dark);
      background-image: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 2rem;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      text-align: center;
      margin-bottom: 4rem;
    }

    .header h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 3.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(to bottom, #fff, #94a3b8);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }

    .header p {
      color: var(--text-dim);
      font-size: 1.1rem;
      font-weight: 400;
    }

    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      padding: 2.5rem;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
    }

    .glass-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.1), transparent);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      margin-bottom: 2.5rem;
      align-items: center;
    }

    .btn {
      padding: 0.8rem 1.6rem;
      border-radius: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
      border: 1px solid transparent;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 0.95rem;
      user-select: none;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 15px var(--primary-glow);
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px var(--primary-glow);
    }

    .btn-ghost {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--glass-border);
      color: var(--text-main);
    }

    .btn-ghost:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.2);
      color: #f87171;
    }

    .btn-danger:hover:not(:disabled) {
      background: var(--danger);
      color: white;
      border-color: var(--danger);
    }

    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      filter: grayscale(1);
    }

    .search-box {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 0.8rem 1.2rem;
      color: white;
      outline: none;
      width: 240px;
      transition: all 0.3s;
    }

    .search-box:focus {
      border-color: var(--primary);
      background: rgba(0, 0, 0, 0.3);
      width: 280px;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding: 0 0.5rem;
    }

    .stats {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: var(--text-dim);
    }

    .stats span {
      color: var(--primary);
      font-weight: 600;
    }

    .file-grid-container {
      max-height: 550px;
      overflow-y: auto;
      margin-bottom: 2rem;
      padding-right: 15px;
      scrollbar-gutter: stable;
    }

    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1.5rem;
      min-height: 100px;
    }

    .file-card {
      background: var(--card-gradient);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 1rem;
      text-align: center;
      position: relative;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.3s, background 0.3s, box-shadow 0.3s;
      cursor: grab;
      user-select: none;
    }

    .file-card:active {
      cursor: grabbing;
    }

    .file-card.dragging {
      opacity: 0.2;
      transform: scale(0.9);
      border: 2px dashed var(--primary);
    }

    .file-card:hover {
      transform: translateY(-8px);
      border-color: rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
    }

    .file-card.selected {
      border-color: var(--primary);
      background: rgba(99, 102, 241, 0.15);
      box-shadow: 0 0 0 2px var(--primary);
    }

    .file-thumb {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 1rem;
      background: #0f172a;
      pointer-events: none;
    }

    .file-name {
      font-size: 0.85rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-main);
      margin-bottom: 0.25rem;
    }

    .file-size {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-dim);
    }

    /* Individual selection toggle circle */
    .selection-indicator {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.5);
      border: 2px solid rgba(255, 255, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
      z-index: 2;
    }

    .file-card.selected .selection-indicator {
      background: var(--primary);
      border-color: var(--primary);
      box-shadow: 0 0 10px var(--primary-glow);
    }

    .selection-indicator::after {
      content: '✓';
      color: white;
      font-size: 14px;
      font-weight: 800;
      display: none;
    }

    .file-card.selected .selection-indicator::after {
      display: block;
    }

    .remove-file {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: rgba(239, 68, 68, 0.1);
      border: none;
      color: #f87171;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: 0.3s;
      z-index: 2;
    }

    .file-card:hover .remove-file {
      opacity: 1;
    }

    .remove-file:hover {
      background: var(--danger);
      color: white;
    }

    .action-panel {
      border-top: 1px solid var(--glass-border);
      padding-top: 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .convert-btn {
      padding: 1.2rem 4rem;
      font-size: 1.15rem;
      border-radius: 18px;
    }

    .empty-state {
      grid-column: 1 / -1;
      padding: 6rem 2rem;
      text-align: center;
      color: var(--text-dim);
      border: 2px dashed var(--glass-border);
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.015);
      transition: 0.4s;
    }

    .empty-state:hover {
      background: rgba(255, 255, 255, 0.03);
      border-color: rgba(255, 255, 255, 0.15);
      transform: scale(1.005);
    }

    .empty-state h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 2rem;
      margin-bottom: 0.75rem;
      color: var(--text-main);
      letter-spacing: -0.01em;
    }

    .empty-state p {
      max-width: 440px;
      margin: 0 auto;
      line-height: 1.6;
      font-size: 1rem;
    }

    .animate-float {
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0) rotate(0);
      }

      50% {
        transform: translateY(-15px) rotate(2deg);
      }
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--glass-border);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    @media (max-width: 640px) {
      .header h1 {
        font-size: 2.5rem;
      }

      .toolbar {
        justify-content: center;
      }

      .search-box {
        width: 100%;
      }

      .search-box:focus {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>Pro Image to PDF</h1>
      <p>Luxury studio-grade conversion for your visual assets.</p>
    </div>

    <div class="glass-card">
      <div class="toolbar">
        <button class="btn btn-primary" onclick="document.getElementById('explorerInput').click()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          <span>Add Images</span>
        </button>
        <input type="file" id="explorerInput" multiple accept="image/*" class="hidden" style="display:none">

        <button class="btn btn-ghost" id="selectAllBtn" onclick="toggleSelectAll()" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12" />
          </svg>
          <span id="selectAllText">Select All</span>
        </button>

        <button class="btn btn-danger" id="clearBtn" onclick="clearLibrary()" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
          </svg>
          <span>Clear Studio</span>
        </button>

        <div style="flex-grow: 1;"></div>

        <input type="text" id="searchInput" class="search-box" placeholder="Search studio..." oninput="renderFiles()">
      </div>

      <div class="status-bar">
        <div class="stats" id="explorerStatus"><span>0</span> Images Loaded</div>
        <div class="stats" id="selectionStatus"><span>0</span> Selected</div>
      </div>

      <div class="file-grid-container" id="gridContainer">
        <div id="fileGrid" class="file-grid">
          <!-- Dynamically populated -->
        </div>
      </div>

      <div class="action-panel">
        <button class="btn btn-primary convert-btn" id="convertBtn" disabled onclick="convertImagesToPdf()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="12" y1="18" x2="12" y2="12" />
            <polyline points="9 15 12 12 15 15" />
          </svg>
          Generate High-Fidelity PDF
        </button>
        <p style="font-size: 0.85rem; color: var(--text-dim);">The PDF will follow the sequence above. Drag cards to
          reorder your storyboard.</p>
      </div>
    </div>
  </div>

  <template id="emptyStateTemplate">
    <div class="empty-state">
      <div class="animate-float" style="margin-bottom: 2.5rem; display: inline-block;">
        <svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="0.7">
          <rect x="3" y="3" width="18" height="18" rx="5" ry="5" />
          <circle cx="8.5" cy="8.5" r="1.8" fill="#818cf8" />
          <path d="M21 15l-5-5-2 2-3-3L3 21" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </div>
      <h2>Empty Storyboard</h2>
      <p>Your studio is ready. Drag imagery here or click 'Add Images' to begin crafting your document. You can
        rearrange items at any time.</p>
    </div>
  </template>

  <script>
    const { jsPDF } = window.jspdf;

    let explorerFiles = [];
    let draggedId = null;
    const searchInput = document.getElementById('searchInput');

    function renderFiles() {
      const grid = document.getElementById('fileGrid');
      const term = searchInput.value.toLowerCase();

      let list = [...explorerFiles];
      if (term) list = list.filter(f => f.name.toLowerCase().includes(term));

      grid.innerHTML = '';

      if (explorerFiles.length === 0) {
        const template = document.getElementById('emptyStateTemplate');
        grid.appendChild(template.content.cloneNode(true));
        updateStatus();
        return;
      }

      list.forEach((f) => {
        const card = document.createElement('div');
        card.className = `file-card ${f.selected ? 'selected' : ''}`;
        card.draggable = true;
        card.dataset.id = f.id;

        // Selection Toggle
        card.onclick = (e) => {
          // Check if clicking remove button
          if (e.target.closest('.remove-file')) return;
          toggleSelect(f.id);
        };

        // Drag and Drop Logic
        card.ondragstart = (e) => {
          draggedId = f.id;
          card.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        };

        card.ondragend = () => {
          card.classList.remove('dragging');
          draggedId = null;
        };

        card.ondragover = (e) => {
          e.preventDefault();
          const draggingCard = document.querySelector('.dragging');
          if (!draggingCard || draggingCard === card) return;

          const fromIndex = explorerFiles.findIndex(x => x.id === draggedId);
          const toIndex = explorerFiles.findIndex(x => x.id === f.id);

          if (fromIndex !== -1 && toIndex !== -1 && fromIndex !== toIndex) {
            const [movedItem] = explorerFiles.splice(fromIndex, 1);
            explorerFiles.splice(toIndex, 0, movedItem);
            renderFiles(); // Instant feedback
          }
        };

        const indicator = document.createElement('div');
        indicator.className = 'selection-indicator';
        card.appendChild(indicator);

        const removeBtn = document.createElement('button');
        removeBtn.className = 'remove-file';
        removeBtn.innerHTML = '✕';
        removeBtn.onclick = (e) => {
          e.stopPropagation();
          removeFile(f.id);
        };
        card.appendChild(removeBtn);

        const img = document.createElement('img');
        img.src = f.url;
        img.className = 'file-thumb';
        img.alt = f.name;
        card.appendChild(img);

        const nameDiv = document.createElement('div');
        nameDiv.className = 'file-name';
        nameDiv.textContent = f.name;
        card.appendChild(nameDiv);

        const sizeDiv = document.createElement('div');
        sizeDiv.className = 'file-size';
        sizeDiv.textContent = `${(f.size / 1024).toFixed(1)} KB`;
        card.appendChild(sizeDiv);

        grid.appendChild(card);
      });

      updateStatus();
    }

    function toggleSelect(id) {
      const f = explorerFiles.find(x => x.id === id);
      if (f) f.selected = !f.selected;
      renderFiles();
    }

    function removeFile(id) {
      const index = explorerFiles.findIndex(f => f.id === id);
      if (index > -1) {
        URL.revokeObjectURL(explorerFiles[index].url);
        explorerFiles.splice(index, 1);
        renderFiles();
      }
    }

    function toggleSelectAll() {
      if (explorerFiles.length === 0) return;
      // If all are selected, deselect all. Otherwise, select all.
      const allSelected = explorerFiles.every(f => f.selected);
      explorerFiles.forEach(f => f.selected = !allSelected);
      renderFiles();
    }

    function clearLibrary() {
      // Revoke all object URLs to free up memory
      explorerFiles.forEach(f => {
        if (f.url) URL.revokeObjectURL(f.url);
      });

      // Empty the array
      explorerFiles = [];

      // Refresh the UI
      renderFiles();

      // Reset search if active
      if (searchInput) searchInput.value = '';
    }

    function updateStatus() {
      const count = explorerFiles.length;
      const selCount = explorerFiles.filter(f => f.selected).length;

      document.getElementById('explorerStatus').innerHTML = `<span>${count}</span> Images Loaded`;
      document.getElementById('selectionStatus').innerHTML = `<span>${selCount}</span> Selected`;

      document.getElementById('clearBtn').disabled = count === 0;
      document.getElementById('convertBtn').disabled = selCount === 0;

      const selectAllBtn = document.getElementById('selectAllBtn');
      const selectAllText = document.getElementById('selectAllText');

      if (count > 0 && selCount === count) {
        selectAllText.textContent = 'Deselect All';
      } else {
        selectAllText.textContent = 'Select All';
      }
      selectAllBtn.disabled = count === 0;
    }

    document.getElementById('explorerInput').addEventListener('change', e => {
      handleFiles(Array.from(e.target.files));
      e.target.value = '';
    });

    function handleFiles(files) {
      files.forEach((file) => {
        if (!file.type.startsWith('image/')) return;
        const id = Math.random().toString(36).substr(2, 9);
        explorerFiles.push({
          id, name: file.name, size: file.size, type: file.type,
          url: URL.createObjectURL(file), file, selected: true
        });
      });
      renderFiles();
    }

    async function convertImagesToPdf() {
      const sel = explorerFiles.filter(f => f.selected);
      if (!sel.length) return;

      const btn = document.getElementById('convertBtn');
      const originalHTML = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = `
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="animate-float">
            <path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4" />
        </svg>
        Compiling PDF...
      `;

      try {
        const pdf = new jsPDF();
        for (let i = 0; i < sel.length; i++) {
          const f = sel[i];
          const dataUrl = await new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.readAsDataURL(f.file);
          });

          if (i > 0) pdf.addPage();
          const props = pdf.getImageProperties(dataUrl);
          const wp = pdf.internal.pageSize.getWidth();
          const hp = pdf.internal.pageSize.getHeight();
          const ratio = Math.min(wp / props.width, hp / props.height);
          const w = props.width * ratio;
          const h = props.height * ratio;
          pdf.addImage(dataUrl, 'JPEG', (wp - w) / 2, (hp - h) / 2, w, h);
        }
        pdf.save(`TGH_Studio_${Date.now()}.pdf`);
      } catch (err) {
        console.error(err);
        alert('Compiling failed. Please ensure images are valid.');
      } finally {
        btn.disabled = false;
        btn.innerHTML = originalHTML;
      }
    }

    // Global Drop Support
    window.addEventListener('dragover', e => e.preventDefault());
    window.addEventListener('drop', e => {
      e.preventDefault();
      if (draggedId === null && e.dataTransfer.files.length > 0) {
        handleFiles(Array.from(e.dataTransfer.files));
      }
    });

    // Initial render
    renderFiles();
  </script>
</body>

</html>
